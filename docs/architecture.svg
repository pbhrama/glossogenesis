<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-soft: #55585c;
      --surface: #ffffff;
      --surface-alt: #f3f4f6;
      --line: #c7cbd1;
      --procurement: #d98a3d;
      --compliance: #5aa3c9;
      --pidgin: #c398e0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #eceef1;
        --ink-soft: #a6acb4;
        --surface: #17181b;
        --surface-alt: #212327;
        --line: #3a3d42;
        --procurement: #e8a565;
        --compliance: #7cbbdc;
        --pidgin: #d6aeeb;
      }
    }
    .bg { fill: var(--surface); }
    .box { fill: var(--surface-alt); stroke: var(--line); stroke-width: 1.5; }
    .box-pidgin { fill: var(--surface-alt); stroke: var(--pidgin); stroke-width: 1.5; }
    .box-baseline { fill: var(--surface-alt); stroke: var(--line); stroke-width: 1.5; stroke-dasharray: 5 3; }
    .box-api { fill: var(--surface-alt); stroke: var(--ink-soft); stroke-width: 1.5; }
    .box-deploy { fill: var(--surface-alt); stroke: var(--ink-soft); stroke-width: 1; }
    .lane-label { fill: var(--ink-soft); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .title { fill: var(--ink); font-size: 12px; font-weight: 600; }
    .subtitle { fill: var(--ink-soft); font-size: 10.5px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .node-title { fill: var(--ink); font-size: 12.5px; font-weight: 600; }
    .node-sub { fill: var(--ink-soft); font-size: 10px; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
    .edge { stroke: var(--ink-soft); stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .edge-pidgin { stroke: var(--pidgin); stroke-width: 1.6; fill: none; marker-end: url(#arrow-pidgin); }
    .heading { fill: var(--ink); font-size: 20px; font-weight: 700; }
    .procurement-dot { fill: var(--procurement); }
    .compliance-dot { fill: var(--compliance); }
    .pidgin-dot { fill: var(--pidgin); }
    .annotation { fill: var(--ink-soft); font-size: 10.5px; font-style: italic; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--ink-soft)"/>
    </marker>
    <marker id="arrow-pidgin" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--pidgin)"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="900"/>
  <text class="heading" x="30" y="38">Glossogenesis — Architecture</text>
  <text class="subtitle" x="30" y="58">Pidgin negotiation vs. structured-schema baseline, same task, same model</text>

  <!-- Task input -->
  <rect class="box" x="30" y="140" width="140" height="70" rx="6"/>
  <text class="node-title" x="100" y="170" text-anchor="middle">Task input</text>
  <text class="node-sub" x="100" y="188" text-anchor="middle">tasks/task_NN.json</text>

  <!-- PIDGIN LANE -->
  <text class="lane-label" x="220" y="100">Pidgin condition</text>
  <rect class="box-pidgin" x="220" y="120" width="150" height="60" rx="6"/>
  <circle class="procurement-dot" cx="234" cy="145" r="4"/>
  <text class="node-title" x="246" y="150">Procurement-agent</text>
  <text class="node-sub" x="234" y="168">agents/base.py</text>

  <rect class="box-pidgin" x="410" y="120" width="150" height="60" rx="6"/>
  <text class="node-title" x="485" y="145" text-anchor="middle">TurnController</text>
  <text class="node-sub" x="485" y="163" text-anchor="middle">controller.py</text>
  <text class="node-sub" x="485" y="176" text-anchor="middle">seal / reveal enforcement</text>

  <rect class="box-pidgin" x="600" y="120" width="150" height="60" rx="6"/>
  <circle class="compliance-dot" cx="614" cy="145" r="4"/>
  <text class="node-title" x="626" y="150">Compliance-agent</text>
  <text class="node-sub" x="614" y="168">agents/base.py</text>

  <rect class="box-pidgin" x="410" y="215" width="150" height="70" rx="6"/>
  <circle class="pidgin-dot" cx="424" cy="240" r="4"/>
  <text class="node-title" x="436" y="245">Dictionary Store</text>
  <text class="node-sub" x="485" y="263" text-anchor="middle">local JSON ⇄ Redis toggle</text>
  <text class="node-sub" x="485" y="276" text-anchor="middle">dictionary/store.py · store_redis.py</text>

  <!-- BASELINE LANE -->
  <text class="lane-label" x="220" y="330">Baseline condition</text>
  <rect class="box-baseline" x="220" y="350" width="150" height="60" rx="6"/>
  <circle class="procurement-dot" cx="234" cy="375" r="4"/>
  <text class="node-title" x="246" y="380">Procurement-agent</text>
  <text class="node-sub" x="234" y="398">agents/base_baseline.py</text>

  <rect class="box-baseline" x="410" y="350" width="150" height="60" rx="6"/>
  <text class="node-title" x="485" y="375" text-anchor="middle">BaselineController</text>
  <text class="node-sub" x="485" y="393" text-anchor="middle">controller_baseline.py</text>

  <rect class="box-baseline" x="600" y="350" width="150" height="60" rx="6"/>
  <circle class="compliance-dot" cx="614" cy="375" r="4"/>
  <text class="node-title" x="626" y="380">Compliance-agent</text>
  <text class="node-sub" x="614" y="398">agents/base_baseline.py</text>

  <text class="annotation" x="410" y="435">full shared JSON schema known upfront — no coined vocab, no sealing</text>

  <!-- Shared API box -->
  <rect class="box-api" x="850" y="220" width="170" height="90" rx="6"/>
  <text class="node-title" x="935" y="252" text-anchor="middle">Qwen Cloud API</text>
  <text class="node-sub" x="935" y="270" text-anchor="middle">qwen-plus (both agents)</text>
  <text class="node-sub" x="935" y="284" text-anchor="middle">OpenAI-compatible SDK</text>
  <text class="node-sub" x="935" y="297" text-anchor="middle">dashscope-intl</text>

  <!-- Convergence -->
  <rect class="box" x="850" y="360" width="170" height="60" rx="6"/>
  <text class="node-title" x="935" y="385" text-anchor="middle">run_all_tasks.py</text>
  <text class="node-sub" x="935" y="403" text-anchor="middle">runs both arms per task</text>

  <rect class="box" x="850" y="450" width="170" height="60" rx="6"/>
  <text class="node-title" x="935" y="475" text-anchor="middle">logs/summary.json</text>
  <text class="node-sub" x="935" y="493" text-anchor="middle">rounds, clarifications, dict size</text>

  <rect class="box-pidgin" x="850" y="540" width="170" height="80" rx="6"/>
  <text class="node-title" x="935" y="565" text-anchor="middle">Result: learning curve</text>
  <text class="node-sub" x="935" y="584" text-anchor="middle">clarification cost → 0</text>
  <text class="node-sub" x="935" y="598" text-anchor="middle">after task_01 dictionary matures</text>

  <!-- Edges -->
  <path class="edge" d="M170,175 C195,175 195,150 220,150"/>
  <path class="edge" d="M170,175 C195,175 195,380 220,380"/>

  <path class="edge-pidgin" d="M370,150 L410,150"/>
  <path class="edge-pidgin" d="M560,150 L600,150"/>
  <path class="edge-pidgin" d="M485,180 L485,215"/>

  <path class="edge" d="M370,380 L410,380"/>
  <path class="edge" d="M560,380 L600,380"/>

  <path class="edge-pidgin" d="M750,150 C820,150 820,240 850,255"/>
  <path class="edge" d="M750,380 C820,380 820,270 850,275"/>

  <path class="edge" d="M935,310 L935,360"/>
  <path class="edge" d="M935,420 L935,450"/>
  <path class="edge" d="M935,510 L935,540"/>

  <!-- Deployment band -->
  <line x1="0" y1="680" x2="1200" y2="680" stroke="var(--line)" stroke-width="1"/>
  <text class="lane-label" x="30" y="710">Deployment</text>

  <rect class="box-deploy" x="30" y="730" width="260" height="90" rx="6"/>
  <text class="node-title" x="160" y="758" text-anchor="middle">Local (dev)</text>
  <text class="node-sub" x="160" y="776" text-anchor="middle">run_negotiation.py / run_baseline.py</text>
  <text class="node-sub" x="160" y="790" text-anchor="middle">dictionary/store.py (JSON file)</text>
  <text class="node-sub" x="160" y="804" text-anchor="middle">DASHSCOPE_API_KEY from shell env</text>

  <rect class="box-deploy" x="330" y="730" width="320" height="90" rx="6"/>
  <text class="node-title" x="490" y="758" text-anchor="middle">Alibaba Cloud</text>
  <text class="node-sub" x="490" y="776" text-anchor="middle">Function Compute — fc_handler.py</text>
  <text class="node-sub" x="490" y="790" text-anchor="middle">ApsaraDB for Redis — store_redis.py</text>
  <text class="node-sub" x="490" y="804" text-anchor="middle">s.yaml (Serverless Devs, ap-southeast-1)</text>

  <path class="edge" d="M290,775 L330,775"/>

  <text class="annotation" x="30" y="850">Same agent/controller code targets either backing store — DictionaryStore and RedisDictionaryStore share one interface.</text>
</svg>
